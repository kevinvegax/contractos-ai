name: Database Migrations

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - migrations/**
      - .github/workflows/database-migrations.yml
  push:
    branches:
      - main
    paths:
      - migrations/**
      - .github/workflows/database-migrations.yml

permissions:
  contents: read

env:
  FLYWAY_IMAGE: flyway/flyway:12

jobs:
  migrate-staging:
    name: Run staging migrations
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: database-migrations-staging
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Flyway database URL
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::Missing STAGING_DATABASE_URL secret"
            exit 1
          fi

          node <<'NODE'
          const crypto = require('node:crypto')
          const fs = require('node:fs')

          const databaseUrl = process.env.DATABASE_URL
          const envFile = process.env.GITHUB_ENV

          function appendEnv(name, value) {
            const delimiter = `EOF_${name}_${crypto.randomUUID().replaceAll('-', '')}`
            fs.appendFileSync(envFile, `${name}<<${delimiter}\n${value}\n${delimiter}\n`)
          }

          if (databaseUrl.startsWith('jdbc:')) {
            appendEnv('FLYWAY_URL', databaseUrl)
            process.exit(0)
          }

          const parsed = new URL(databaseUrl)

          if (!['postgres:', 'postgresql:'].includes(parsed.protocol)) {
            throw new Error('DATABASE_URL must use postgres://, postgresql://, or jdbc:postgresql://')
          }

          const flywayUrl = `jdbc:postgresql://${parsed.host}${parsed.pathname}${parsed.search}`

          appendEnv('FLYWAY_URL', flywayUrl)

          if (parsed.username) {
            const username = decodeURIComponent(parsed.username)
            console.log(`::add-mask::${username}`)
            appendEnv('FLYWAY_USER', username)
          }

          if (parsed.password) {
            const password = decodeURIComponent(parsed.password)
            console.log(`::add-mask::${password}`)
            appendEnv('FLYWAY_PASSWORD', password)
          }
          NODE

      - name: Run Flyway migrations
        shell: bash
        run: |
          set -euo pipefail

          docker_args=(
            --rm
            -v "${PWD}/migrations:/flyway/sql:ro"
            -e FLYWAY_URL
          )

          if [ -n "${FLYWAY_USER:-}" ]; then
            docker_args+=(-e FLYWAY_USER)
          fi

          if [ -n "${FLYWAY_PASSWORD:-}" ]; then
            docker_args+=(-e FLYWAY_PASSWORD)
          fi

          docker run "${docker_args[@]}" "$FLYWAY_IMAGE" \
            -locations=filesystem:/flyway/sql \
            -connectRetries=10 \
            migrate

  migrate-production:
    name: Run production migrations
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: database-migrations-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Flyway database URL
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::Missing PRODUCTION_DATABASE_URL secret"
            exit 1
          fi

          node <<'NODE'
          const crypto = require('node:crypto')
          const fs = require('node:fs')

          const databaseUrl = process.env.DATABASE_URL
          const envFile = process.env.GITHUB_ENV

          function appendEnv(name, value) {
            const delimiter = `EOF_${name}_${crypto.randomUUID().replaceAll('-', '')}`
            fs.appendFileSync(envFile, `${name}<<${delimiter}\n${value}\n${delimiter}\n`)
          }

          if (databaseUrl.startsWith('jdbc:')) {
            appendEnv('FLYWAY_URL', databaseUrl)
            process.exit(0)
          }

          const parsed = new URL(databaseUrl)

          if (!['postgres:', 'postgresql:'].includes(parsed.protocol)) {
            throw new Error('DATABASE_URL must use postgres://, postgresql://, or jdbc:postgresql://')
          }

          const flywayUrl = `jdbc:postgresql://${parsed.host}${parsed.pathname}${parsed.search}`

          appendEnv('FLYWAY_URL', flywayUrl)

          if (parsed.username) {
            const username = decodeURIComponent(parsed.username)
            console.log(`::add-mask::${username}`)
            appendEnv('FLYWAY_USER', username)
          }

          if (parsed.password) {
            const password = decodeURIComponent(parsed.password)
            console.log(`::add-mask::${password}`)
            appendEnv('FLYWAY_PASSWORD', password)
          }
          NODE

      - name: Run Flyway migrations
        shell: bash
        run: |
          set -euo pipefail

          docker_args=(
            --rm
            -v "${PWD}/migrations:/flyway/sql:ro"
            -e FLYWAY_URL
          )

          if [ -n "${FLYWAY_USER:-}" ]; then
            docker_args+=(-e FLYWAY_USER)
          fi

          if [ -n "${FLYWAY_PASSWORD:-}" ]; then
            docker_args+=(-e FLYWAY_PASSWORD)
          fi

          docker run "${docker_args[@]}" "$FLYWAY_IMAGE" \
            -locations=filesystem:/flyway/sql \
            -connectRetries=10 \
            migrate
